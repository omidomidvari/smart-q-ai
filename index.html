<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wiktionary Autonomous Brain</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0f0f1a; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 1px solid #444; }
        input { padding: 10px; width: 250px; background: #111; color: #0f0; border: 1px solid #0f0; outline: none; }
        button { padding: 10px; cursor: pointer; background: #0f0; color: #000; border: none; font-weight: bold; }
        #log { position: absolute; bottom: 20px; left: 20px; color: #0f0; max-height: 150px; overflow: hidden; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui">
    <input type="text" id="wordInput" placeholder="Talk to the brain...">
    <button onclick="handleInput()">SEND</button>
</div>
<div id="log"></div>
<div id="container"></div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;
    const engine = Engine.create();
    engine.gravity.y = 0.3; 

    const render = Render.create({
        element: document.getElementById('container'),
        engine: engine,
        options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#0f0f1a' }
    });

    const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight+20, window.innerWidth, 60, { isStatic: true });
    const wallL = Bodies.rectangle(-20, window.innerHeight/2, 60, window.innerHeight, { isStatic: true });
    const wallR = Bodies.rectangle(window.innerWidth+20, window.innerHeight/2, 60, window.innerHeight, { isStatic: true });
    Composite.add(engine.world, [ground, wallL, wallR]);

    async function handleInput() {
        const input = document.getElementById('wordInput');
        const text = input.value.trim();
        if (!text) return;
        input.value = "";

        const agents = Composite.allBodies(engine.world).filter(b => b.isAgent);
        let foundMatch = false;

        agents.forEach(agent => {
            if (text.toLowerCase().includes(agent.word.toLowerCase())) {
                respond(agent, `You mentioned me! I am defined as: ${agent.definition}.`);
                Body.applyForce(agent, agent.position, { x: 0, y: -0.1 });
                foundMatch = true;
            }
        });

        if (!foundMatch) {
            spawnNewThought(text);
        }
    }

    async function spawnNewThought(word) {
        try {
            const res = await fetch(`https://wiktionary.org{word.toLowerCase()}`);
            const data = await res.json();
            const definition = data.en[0].definitions[0].definition.replace(/<[^>]*>?/gm, '');
            
            const bubble = Bodies.rectangle(Math.random()*window.innerWidth, 50, 200, 60, {
                frictionAir: 0.05,
                restitution: 0.6,
                render: { fillStyle: '#111', strokeStyle: '#0f0', lineWidth: 2 }
            });

            bubble.word = word;
            bubble.definition = definition;
            bubble.isAgent = true;
            bubble.chat = `I have arrived. My essence is: ${definition}`;
            
            Composite.add(engine.world, bubble);
            addToLog(`New entity spawned: ${word}`);
        } catch (e) {
            addToLog(`The brain doesn't know "${word}" yet.`);
        }
    }

    function respond(agent, message) {
        agent.chat = message;
        addToLog(`${agent.word.toUpperCase()}: ${message}`);
        setTimeout(() => { agent.chat = null; }, 6000);
    }

    function addToLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `<div>> ${msg}</div>`;
        if (log.childNodes.length > 5) log.removeChild(log.firstChild);
    }

    // AI PATROL LOOP: Move agents autonomously
    Events.on(engine, 'beforeUpdate', () => {
        Composite.allBodies(engine.world).forEach(body => {
            if (body.isAgent) {
                // Random "thinking" movement
                const wanderForce = (Math.random() - 0.5) * 0.001;
                Body.applyForce(body, body.position, { x: wanderForce, y: -0.001 });
            }
        });
    });

    // RENDER TEXT BUBBLES
    Events.on(render, 'afterRender', () => {
        const ctx = render.context;
        Composite.allBodies(engine.world).forEach(body => {
            if (body.word) {
                ctx.fillStyle = "#0f0";
                ctx.font = "bold 14px Courier New";
                ctx.fillText(body.word.toUpperCase(), body.position.x - 40, body.position.y - 10);
                
                if (body.chat) {
                    ctx.fillStyle = "white";
                    ctx.font = "10px Courier New";
                    const lines = body.chat.match(/.{1,30}/g); // Wrap text
                    lines.forEach((line, i) => {
                        ctx.fillText(line, body.position.x - 90, body.position.y + 15 + (i * 12));
                    });
                }
            }
        });
    });

    Render.run(render);
    Runner.run(Runner.create(), engine);
</script>
</body>
</html>
